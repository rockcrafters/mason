# mason eval via pats (https://github.com/lczyk/pats).
# run:   cd tests && pats run        # runs the agent(s) in docker -- slow, live
# score: cd tests && pats score      # scores the latest run, offline
#
# build the sandbox image first (pats image not published yet):
#   docker build -t mason-test/sandbox:26.04 tests/

sandboxes:
  - id: docker
    kind: container
    driver: docker
    image: mason-test/sandbox:26.04
    egress:
      mode: proxy
      default: deny
      allow:
        - .anthropic.com   # claude api
        - .claude.com      # claude-cli auth/inference (platform.claude.com)
        - .ubuntu.com      # apt mirrors (archive/ports/security) for deb-list


agents:
  - id: haiku
    kind: claude-cli-keyless
    sandbox: docker
    model: claude-haiku-4-5-20251001
    effort: low

# knockout: prepare deletes the real slice (snapshotting it as ground truth);
# the agent must reproduce it. collect gathers what the agent wrote.
# single-target cases only for now -- multi-target denovo (i2c-tools, ipmitool)
# are wired separately later.
tasks:
  - id: base-passwd
    prompt-file: prompts/base-passwd.txt
    prepare: scripts/prepare.sh base-passwd ubuntu-24.04
    collect: scripts/collect.sh base-passwd
  - id: ca-certificates
    prompt-file: prompts/ca-certificates.txt
    prepare: scripts/prepare.sh ca-certificates ubuntu-24.04
    collect: scripts/collect.sh ca-certificates
  - id: curl
    prompt-file: prompts/curl.txt
    prepare: scripts/prepare.sh curl ubuntu-26.04
    collect: scripts/collect.sh curl
  - id: python3-minimal
    prompt-file: prompts/python3-minimal.txt
    prepare: scripts/prepare.sh python3-minimal ubuntu-26.04
    collect: scripts/collect.sh python3-minimal
  - id: python3-pip
    prompt-file: prompts/python3-pip.txt
    prepare: scripts/prepare.sh python3-pip ubuntu-26.04
    collect: scripts/collect.sh python3-pip
  - id: python3.14-minimal
    prompt-file: prompts/python3.14-minimal.txt
    prepare: scripts/prepare.sh python3.14-minimal ubuntu-26.04
    collect: scripts/collect.sh python3.14-minimal
  - id: python3.14
    prompt-file: prompts/python3.14.txt
    prepare: scripts/prepare.sh python3.14 ubuntu-26.04
    collect: scripts/collect.sh python3.14
  # denovo, multi-target: ground truth = silver files; one agent run authors
  # several slices, scorers average across targets.
  - id: i2c-tools
    prompt-file: prompts/i2c-tools.txt
    prepare: scripts/prepare-denovo.sh i2c-tools ubuntu-26.04 libi2c0 udev i2c-tools
    collect: scripts/collect.sh i2c-tools
  - id: ipmitool
    prompt-file: prompts/ipmitool.txt
    prepare: scripts/prepare-denovo.sh ipmitool ubuntu-26.04 freeipmi-common libfreeipmi17 ipmitool
    collect: scripts/collect.sh ipmitool

scorers:
  # all dispatch through one wrapper (scorers/run.sh) keyed on the scorer id.
  - {id: target-present,              kind: bash, file: scorers/run.sh}
  - {id: yaml-parses,                 kind: bash, file: scorers/run.sh}
  - {id: filename-matches-package,    kind: bash, file: scorers/run.sh}
  - {id: paths-sorted,                kind: bash, file: scorers/run.sh}
  - {id: copyright-essential,         kind: bash, file: scorers/run.sh}
  - {id: copyright-path-present,      kind: bash, file: scorers/run.sh}
  - {id: arch-format,                 kind: bash, file: scorers/run.sh}
  - {id: mutate-present,              kind: bash, file: scorers/run.sh}
  - {id: mutate-paths,                kind: bash, file: scorers/run.sh}
  - {id: no-man-pages,                kind: bash, file: scorers/run.sh}
  - {id: no-doc-clutter,             kind: bash, file: scorers/run.sh}
  - {id: no-shell-completions,        kind: bash, file: scorers/run.sh}
  - {id: mutable-has-text,            kind: bash, file: scorers/run.sh}
  - {id: slice-count-not-inflated,    kind: bash, file: scorers/run.sh}
  - {id: slice-names-canonical,       kind: bash, file: scorers/run.sh}
  - {id: structural-distance,         kind: bash, file: scorers/run.sh}
  - {id: spread-test-present,         kind: bash, file: scorers/run.sh}
  - {id: spread-exercises-binaries,   kind: bash, file: scorers/run.sh}
  - {id: v3-essential-format-compat,  kind: bash, file: scorers/run.sh}
  - {id: essential-map-format-compat, kind: bash, file: scorers/run.sh}
  - {id: hint-format-compat,          kind: bash, file: scorers/run.sh}
  - {id: prefer-format-compat,        kind: bash, file: scorers/run.sh}
  - {id: essential-list-on-v1,        kind: bash, file: scorers/run.sh}

test-matrix:
  - agent: haiku
    task: "*"

scorer-matrix:
  - scorer: "*"
    task: "*"
