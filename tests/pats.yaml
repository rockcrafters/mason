# mason eval via pats (https://github.com/lczyk/pats).
# run:   cd tests && pats run        # runs the agent(s) in docker -- slow, live
# score: cd tests && pats score      # scores the latest run, offline
#
# build the sandbox image first (pats image not published yet):
#   docker build -t mason-test/sandbox:26.04 tests/

sandboxes:
  # github.com / raw.githubusercontent.com / codeload.github.com are deliberately
  # NOT allowed on either sandbox below. the skill's write-slice workflow (Step 2)
  # legitimately wants to fetch sibling-branch SDFs from github for cross-release
  # comparison -- but for several of our knockout cases that sibling SDF IS (or is
  # near-identical to) the held-out answer, so allowing github would reopen the
  # answer-leak this harness exists to prevent. Step 2 is expected to fail/no-op
  # under this policy; that's intentional, not a gap.
  # claude-cli harness: only anthropic + apt mirrors.
  - id: docker-mason-test
    kind: container
    driver: docker
    image: mason-test/sandbox:26.04
    egress:
      mode: proxy
      default: deny
      allow:
        - .anthropic.com   # claude api
        - .claude.com      # claude-cli auth (platform.claude.com) -- not hit every
                           # run (token-refresh path), but required when it fires:
                           # missing it causes "401 Invalid authentication credentials"
        - .ubuntu.com      # apt mirrors (archive/ports/security) for deb-list
  # opencode harness: openrouter + its startup fetches (model catalog, npm) + apt.
  - id: docker-mason-test-oc
    kind: container
    driver: docker
    image: mason-test/sandbox:26.04
    egress:
      mode: proxy
      default: deny
      allow:
        - openrouter.ai        # opencode -> openrouter (proxies to providers)
        - models.dev           # opencode model catalog
        - registry.npmjs.org   # opencode runtime plugin/dep fetch
        - .ubuntu.com          # apt mirrors for deb-list


agents:
  - id: haiku
    kind: claude-cli-keyless
    sandbox: docker-mason-test
    model: claude-haiku-4-5-20251001
    effort: low
  # gemini-2.5-flash-lite benched too weak for this skill: broke tool-call
  # namespacing (`default_api.skill`), dumped pseudocode as plain text instead
  # of calling tools, and fabricated done-state (claimed files written/committed
  # that don't exist in output). see .pats/runs/20260630-012.
  # - id: gemini
  #   kind: opencode-openrouter
  #   sandbox: docker-mason-test-oc
  #   model: google/gemini-2.5-flash-lite
  - id: gpt-mini
    kind: opencode-openrouter
    sandbox: docker-mason-test-oc
    model: openai/gpt-4o-mini
  # cheap-but-stronger rung, all via openrouter+opencode -- coder-tuned, gpt-5
  # lineage, deepseek-v3 family, GLM, picked from a live openrouter pricing pull.
  - id: qwen3-coder-flash
    kind: opencode-openrouter
    sandbox: docker-mason-test-oc
    model: qwen/qwen3-coder-flash
  - id: gpt-5-mini
    kind: opencode-openrouter
    sandbox: docker-mason-test-oc
    model: openai/gpt-5-mini
  - id: deepseek-v3
    kind: opencode-openrouter
    sandbox: docker-mason-test-oc
    model: deepseek/deepseek-chat-v3.1
  - id: glm-4.6
    kind: opencode-openrouter
    sandbox: docker-mason-test-oc
    model: z-ai/glm-4.6

# knockout: prepare deletes the real slice (snapshotting it as ground truth);
# the agent must reproduce it. collect gathers what the agent wrote.
# single-target cases only for now -- multi-target denovo (i2c-tools, ipmitool)
# are wired separately later.
# each task's setup lives in tasks/prepare_<id>.sh (branch + knockout/denovo +
# any target list baked in; shared logic in tasks/_lib.sh). collect is uniform
# (tasks/collect.sh reads $PATS_TASK_ID). pats execs both directly with ${id} ->
# the task id.
tasks:
  - id: base-passwd
    prompt: prompts/base-passwd.txt
    prepare: tasks/prepare_${id}.sh
    collect: tasks/collect.sh
    timeout: 10m
  - id: ca-certificates
    prompt: prompts/ca-certificates.txt
    prepare: tasks/prepare_${id}.sh
    collect: tasks/collect.sh
    timeout: 10m
  - id: curl
    prompt: prompts/curl.txt
    prepare: tasks/prepare_${id}.sh
    collect: tasks/collect.sh
    timeout: 10m
  - id: python3-minimal
    prompt: prompts/python3-minimal.txt
    prepare: tasks/prepare_${id}.sh
    collect: tasks/collect.sh
    timeout: 10m
  - id: python3-pip
    prompt: prompts/python3-pip.txt
    prepare: tasks/prepare_${id}.sh
    collect: tasks/collect.sh
    timeout: 10m
  - id: python3.14-minimal
    prompt: prompts/python3.14-minimal.txt
    prepare: tasks/prepare_${id}.sh
    collect: tasks/collect.sh
    timeout: 10m
  - id: python3.14
    prompt: prompts/python3.14.txt
    prepare: tasks/prepare_${id}.sh
    collect: tasks/collect.sh
    timeout: 10m
  # denovo, multi-target: ground truth = silver files; one agent run authors
  # several slices, scorers average across targets.
  - id: i2c-tools
    prompt: prompts/i2c-tools.txt
    prepare: tasks/prepare_${id}.sh
    collect: tasks/collect.sh
    timeout: 10m
  - id: ipmitool
    prompt: prompts/ipmitool.txt
    prepare: tasks/prepare_${id}.sh
    collect: tasks/collect.sh
    timeout: 10m

# each scorer is a standalone uv script scorers/scorer_<id>.py (shared helpers
# in scorers/_lib.py). pats execs it directly; first stdout line = float [0,1]
# or `na` (skip). ${id} -> the scorer id.
scorers:
  - {id: target-present,              score: "scorers/scorer_${id}.py"}
  - {id: yaml-parses,                 score: "scorers/scorer_${id}.py"}
  - {id: filename-matches-package,    score: "scorers/scorer_${id}.py"}
  - {id: paths-sorted,                score: "scorers/scorer_${id}.py"}
  - {id: copyright-essential,         score: "scorers/scorer_${id}.py"}
  - {id: copyright-path-present,      score: "scorers/scorer_${id}.py"}
  - {id: arch-format,                 score: "scorers/scorer_${id}.py"}
  - {id: mutate-present,              score: "scorers/scorer_${id}.py"}
  - {id: mutate-paths,                score: "scorers/scorer_${id}.py"}
  - {id: no-man-pages,                score: "scorers/scorer_${id}.py"}
  - {id: no-doc-clutter,             score: "scorers/scorer_${id}.py"}
  - {id: no-shell-completions,        score: "scorers/scorer_${id}.py"}
  - {id: mutable-has-text,            score: "scorers/scorer_${id}.py"}
  - {id: slice-count-not-inflated,    score: "scorers/scorer_${id}.py"}
  - {id: slice-names-canonical,       score: "scorers/scorer_${id}.py"}
  - {id: structural-distance,         score: "scorers/scorer_${id}.py"}
  - {id: chisel-cut,                  score: "scorers/scorer_${id}.py"}
  - {id: orientation-called,          score: "scorers/scorer_${id}.py"}
  - {id: spread-test-present,         score: "scorers/scorer_${id}.py"}
  - {id: spread-exercises-binaries,   score: "scorers/scorer_${id}.py"}
  - {id: v3-essential-format-compat,  score: "scorers/scorer_${id}.py"}
  - {id: essential-map-format-compat, score: "scorers/scorer_${id}.py"}
  - {id: hint-format-compat,          score: "scorers/scorer_${id}.py"}
  - {id: prefer-format-compat,        score: "scorers/scorer_${id}.py"}
  - {id: essential-list-on-v1,        score: "scorers/scorer_${id}.py"}

test-matrix:
  - agent: [haiku, gpt-mini, qwen3-coder-flash, gpt-5-mini, deepseek-v3, glm-4.6]
    task: "*"

scorer-matrix:
  - scorer: "*"
    task: "*"
